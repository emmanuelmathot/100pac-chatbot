name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      # Clé factice : permet d'importer le package en CI (aucun appel réseau).
      MISTRAL_API_KEY: "ci-dummy-key"
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.15"

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Editable install
        run: uv pip install -e .

      - name: Ruff (lint + format)
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Mypy
        run: uv run mypy .

      - name: Tests
        run: uv run pytest -q
