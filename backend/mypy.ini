[mypy]
mypy_path = src
namespace_packages = True
explicit_package_bases = True
plugins = pydantic.mypy
disable_error_code = annotation-unchecked

# Bibliothèques data sans stubs distribués.
[mypy-pandas.*]
ignore_missing_imports = True

[mypy-openpyxl.*]
ignore_missing_imports = True

[mypy-fitz.*]
ignore_missing_imports = True
